services:

  #POSTGRES
  postgres-container:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: unifaat_user
      POSTGRES_PASSWORD: unifaat_user
      POSTGRES_DB: unifaat_dw
      TZ: America/Sao_Paulo
    ports:
      - "6789:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      app-network:
        aliases:
          - postgres_host

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: